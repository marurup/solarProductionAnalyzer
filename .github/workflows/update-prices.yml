name: Update spot prices

on:
  schedule:
    # 14:00 UTC dagligt — day-ahead-priser for i morgen er typisk publiceret ved 13:00 CET
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start dato (YYYY-MM-DD). Default: 2021-01-01'
        required: false
        default: ''
      end_date:
        description: 'Slut dato (YYYY-MM-DD). Default: i morgen'
        required: false
        default: ''
      force_update:
        description: 'Force-gen-fetch også gamle, komplette måneder (sæt til 1)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hent spotpriser
        env:
          START_DATE:   ${{ github.event.inputs.start_date }}
          END_DATE:     ${{ github.event.inputs.end_date }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: node scripts/fetch-prices.mjs

      - name: Commit ændringer
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices
          if git diff --staged --quiet; then
            echo "Ingen ændringer at committe"
          else
            git commit -m "Opdater spotpriser $(date -u +%Y-%m-%dT%H:%MZ)"
            # Rebase oven på eventuelle samtidige pushes (fx hvis dev pushede under backfill)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push fejlede (forsøg $i) — venter 5s og prøver igen"
              sleep 5
            done
          fi

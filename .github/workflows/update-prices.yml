name: Update spot prices

on:
  schedule:
    # 14:00 UTC dagligt — day-ahead-priser for i morgen er typisk publiceret ved 13:00 CET
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start dato (YYYY-MM-DD). Default: 2021-01-01'
        required: false
        default: ''
      end_date:
        description: 'Slut dato (YYYY-MM-DD). Default: i morgen'
        required: false
        default: ''
      force_update:
        description: 'Force-gen-fetch også gamle, komplette måneder (sæt til 1)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Konfigurer git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Hent spotpriser (committer løbende)
        env:
          START_DATE:   ${{ github.event.inputs.start_date }}
          END_DATE:     ${{ github.event.inputs.end_date }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
          COMMIT_EVERY: '5'
        run: node scripts/fetch-prices.mjs

      - name: Sikkerhedsnet — commit eventuelle resterende ændringer
        if: always()
        run: |
          git add data/prices
          if git diff --staged --quiet; then
            echo "Ingen ucommitterede ændringer"
          else
            git commit -m "Final commit ved workflow-afslutning $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push forsøg $i fejlede — venter 5s"
              sleep 5
            done
          fi
